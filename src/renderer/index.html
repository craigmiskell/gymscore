<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; font-src 'self'; img-src 'self' data:;">
    <title>GymScore</title>
  </head>
  <body>
    <a href="prepare_competition.html"><button type="button" class="btn btn-primary" id="createCompetition">Create New Competition</button></a>
    <hr>
    <i class="bi bi-pencil-square"></i>&nbsp;Preparing
    <table class="table table-sm table-striped w-auto" id="preparingCompetitions"></table>
    <hr>
    <i class="bi bi-stopwatch"></i>&nbsp;Live
    <table class="table table-sm table-striped w-auto" id="liveCompetitions"></table>
    <hr>
    <i class="bi bi-check"></i>&nbsp;Past
    <hr>
    <table class="table table-sm table-striped w-auto" id="pastCompetitions"></table>
    <div class="modal fade" tabindex="-1" data-bs-backdrop="static" role="dialog" aria-hidden="true" id="deleteConfirmationModal">
      <div class="modal-dialog modal-sm">
        <div class="modal-content">
          <div class="modal-header">
            <h4 class="modal-title">Delete competition?</h4>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-primary" data-bs-dismiss="modal" id="deleteConfirmationModalNo">No</button>
            <button type="button" class="btn btn-default" id="deleteConfirmationModalYes">Yes</button>
          </div>
        </div>
      </div>
    </div>
    <hr>
    <ul>
      <li><a href="competitors.html"><button type="button" class="btn btn-primary">Edit known competitors</button></a></li>
      <li><a href="gyms.html"><button type="button" class="btn btn-primary" id="editGyms">Edit Gyms</button></a>
      </li>
      <li>Import/export database</li>
      <li><a id="delete-database-button" href="" ><i class="bi b-trash">Delete database</i></a>
        <ul>
          <li>TODO: lots of prompts (e.g. type random generated phrase to confirm)</li>
        </ul>
      </li>
    </ul>
  </body>
</html>
