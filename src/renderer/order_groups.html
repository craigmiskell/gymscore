<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; font-src 'self' data:; img-src 'self' data:;">
    <title>GymScore - Order Competitor Groups</title>
  </head>
  <body>
    <div class="d-flex align-items-center mb-2">
      <a href="#" id="backLink"><i class="bi bi-arrow-90deg-left"></i> Back to Preparation</a>
      <h1 class="flex-grow-1 text-center mb-0">Order Competitor Groups</h1>
      <div id="hamburgerMenuContainer"></div>
    </div>
    <hr>
    <div class="d-flex flex-wrap gap-3" id="stepsContainer"></div>

    <div class="modal fade" tabindex="-1" data-bs-backdrop="static" role="dialog" aria-hidden="true" id="orderModal">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="orderModalTitle"></h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cancel"></button>
          </div>
          <div class="modal-body">
            <p class="text-muted small mb-2">Drag and drop to reorder.</p>
            <ul class="list-group" id="orderList"></ul>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-success d-none" id="saveAndNextButton">Save &amp; Next</button>
            <button type="button" class="btn btn-primary" id="saveOrderButton">Save</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
