<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; font-src 'self' data:; img-src 'self' data:;">
    <title>GymScore - Live Competition</title>
  </head>
  <body>
    <div class="row">
      <span class="col-1"></span>
      <span class="col-9 text-center"><h1>Gyms</h1></span>
      <span class="col-2"></span>
    </div>
    <div class="row">
      <span class="col-1">
        <a href="index.html"><i class="bi bi-arrow-90deg-left"></i></a>
      </span>
    </div>
    <hr>
    <table class="table table-sm table-striped table-bordered w-auto" id="gyms">
      <thead><tr><th>Name</th><th>Edit</th></tr></thead>
      <tbody></tbody>
    </table>

    <!-- Edit modal -->
    <div class="modal fade" tabindex="-1" data-bs-backdrop="static" role="dialog" aria-hidden="true" id="editGymModal">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h4 class="modal-title">Edit Gym</h4>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="editGymForm" class="needs-validation" novalidate>
              <div class="row mb-2">
                <label for="editGymName" class="form-label col-3 col-form-label text-nowrap">Name</label>
                <div class="col">
                  <input type="text" class="form-control" id="editGymName" required>
                  <div class="invalid-feedback">Name is required</div>
                </div>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-primary" id="editGymSave">Save</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
