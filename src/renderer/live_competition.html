<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; font-src 'self' data:; img-src 'self' data:;">
    <title>GymScore - Live Competition</title>
  </head>
  <body>
    <div class="row">
      <span class="col-1"></span>
      <span class="col-9 text-center"><h1 id="competitionTitle">Live Competition</h1></span>
      <span class="col-2 d-flex align-items-center justify-content-end">
        <button class="btn btn-success" id="finishCompetitionButton"><i class="bi bi-flag-fill"></i> Finish Competition</button>
      </span>
    </div>
    <div class="row">
      <span class="col-1">
        <a href="index.html"><i class="bi bi-arrow-90deg-left"></i></a>
      </span>
      <span class="col-9 text-center"><h2 id="competitionLocation"></h2></span>
      <span class="col-2">
        <a href="index.html" id="pauseCompetitionLink"><i class="bi bi-pause">Pause Competition</i></a>
      </span>
    </div>
    <hr>
    <h2>Results</h2>
    <table class="table table-sm table-striped table-bordered w-auto" id="compResultsTable">
      <thead>
        <tr id="compResultsTableHeaderRow"><th>Group</th></tr>
      </thead>
    </table>
    <div class="modal fade" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false" role="dialog" aria-hidden="true" id="groupApparatusResultsModal">
      <div class="modal-dialog modal-xl">
        <div class="modal-content">
          <div class="modal-header">
            <h4 class="modal-title" id="groupApparatusResultsModalTitle"></h4>
            <button type="button" id="groupApparatusResultsModalDismiss" class="btn-close"aria-label="Cancel"></button>
          </div>
          <div class="modal-footer">
            <form id="groupApparatusResultsModalForm" class="needs-validation" novalidate>
              <table class="table table-sm table-striped table-bordered w-auto" id="groupApparatusResultsModalTable">
                <thead>
                  <tr>
                    <th>Competitor</th><th>D Score</th><th>E1</th><th>E2</th><th>E3</th><th>E4</th><th>Average</th><th>E Score</th><th colspan="2">Neutral Deductions</th><th>Final Score</th>
                  </tr>
                </thead>
                <tbody>
                  <!-- Populated in code -->
                </tbody>
              </table>
              <button type="button" class="btn btn-primary" id="saveScores">Save</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
